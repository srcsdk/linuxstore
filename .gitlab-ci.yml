image: python:3.11

stages:
  - lint
  - test

cache:
  paths:
    - .cache/pip

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

lint:
  stage: lint
  script:
    - pip install flake8
    - flake8 --max-line-length=120 .

compile_check:
  stage: test
  script:
    - if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - find . -name "*.py" -exec python -m py_compile {} \;
